<!DOCTYPE html>
<html lang="pt">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BAC BO AI PRO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="login">
  <h1>🤖 BAC BO AI PRO</h1>
  <p>Sistema Inteligente de Sinais</p>

  <input type="email" id="email" placeholder="Email">
  <input type="password" id="senha" placeholder="Palavra-passe forte">
  <button onclick="login()">ENTRAR</button>
</div>

<div id="app" class="hidden">

  <header>
    <h2>🚀 BOT ATIVO</h2>
  </header>

  <div class="card banca">
    <p>Banca: <span id="banca">5000</span></p>
    <p>Stop Loss: 2000</p>
    <p>Meta: 3000</p>
  </div>

  <div class="card historico">
    <h3>Histórico</h3>
    <div id="lista"></div>

    <div class="btns">
      <button onclick="add('azul')">🔵</button>
      <button onclick="add('vermelho')">🔴</button>
      <button onclick="add('amarelo')">🟡</button>
    </div>
  </div>

  <button class="analisar" onclick="analisar()">ANALISAR</button>

  <div id="loading" class="hidden">🧠 A analisar padrões...</div>

  <div id="resultado"></div>

  <div class="controle">
    <button onclick="win()">WIN</button>
    <button onclick="loss()">LOSS</button>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
