<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>BacBo Bot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>BacBo Bot</h1>
    <div id="status">Carregando...</div>
    <div id="painel"></div>
    <div id="botoes">
        <button id="iniciar">Iniciar</button>
        <button id="parar">Parar</button>
        <button id="limpar">Limpar Histórico</button>
    </div>

    <script src="script.js"></script>
    <script>
        document.getElementById("iniciar").addEventListener("click", () => { iniciarBot(); });
        document.getElementById("parar").addEventListener("click", () => { pararBot(); });
        document.getElementById("limpar").addEventListener("click", () => { limparHistorico(); });

        atualizarStatus();
        atualizarPainel();
    </script>
</body>
</html>
