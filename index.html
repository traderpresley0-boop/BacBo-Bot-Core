<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>BacBo Bot de Sinais</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>BacBo Bot de Sinais</h1>
        <div id="status">Status: <span class="ativo">Ativo</span></div>
    </header>

    <main>
        <div id="painel">
            <div class="tabela">
                <div class="cabecalho">
                    <div>Rodada</div>
                    <div>Resultado</div>
                    <div>Sinais</div>
                    <div>Decisão Final</div>
                </div>
                <div id="linhas"></div>
            </div>
        </div>

        <div id="input-container">
            <label for="novaCor">Adicionar rodada:</label>
            <select id="novaCor">
                <option value="vermelho">Vermelho (Banker)</option>
                <option value="azul">Azul (Player)</option>
                <option value="amarelo">Amarelo (Tie)</option>
            </select>
            <button id="adicionarRodada">Adicionar</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
